<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 32px;
        }

        .joke-box {
            background: #f8f9fa;
            border-left: 5px solid #667eea;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 30px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .joke-text {
            font-size: 18px;
            color: #333;
            line-height: 1.6;
            font-weight: 500;
        }

        .loading {
            color: #667eea;
            font-style: italic;
        }

        .joke-type {
            font-size: 12px;
            color: #999;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .error {
            color: #e74c3c;
            padding: 15px;
            background: #fadbd8;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .counter {
            font-size: 12px;
            color: #999;
            margin-top: 20px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 24px;
            }

            .joke-text {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>😂 Joke Generator</h1>
        
        <div class="error" id="error-message"></div>
        
        <div class="joke-box">
            <div>
                <div class="joke-text" id="joke-text">Click the button to get a random joke!</div>
                <div class="joke-type" id="joke-type"></div>
            </div>
        </div>

        <button id="generate-btn" onclick="generateJoke()">Get a Random Joke</button>

        <div class="counter">
            <p>Jokes generated: <span id="joke-count">0</span></p>
        </div>
    </div>

    <script>
        let jokeCount = 0;

        async function generateJoke() {
            const btn = document.getElementById('generate-btn');
            const jokeText = document.getElementById('joke-text');
            const jokeType = document.getElementById('joke-type');
            const errorMessage = document.getElementById('error-message');

            // Hide error and show loading state
            errorMessage.style.display = 'none';
            jokeText.textContent = '⏳ Loading...';
            jokeText.classList.add('loading');
            jokeType.textContent = '';
            btn.disabled = true;

            try {
                // Fetch from JokeAPI
                const response = await fetch('https://v2.jokeapi.dev/joke/Any?format=json');
                
                if (!response.ok) {
                    throw new Error('Failed to fetch joke');
                }

                const data = await response.json();

                // Display the joke
                jokeText.classList.remove('loading');
                
                if (data.type === 'single') {
                    jokeText.textContent = data.joke;
                } else if (data.type === 'twopart') {
                    jokeText.textContent = `${data.setup}\n\n${data.delivery}`;
                }

                jokeType.textContent = `Type: ${data.category} • ${data.type}`;
                
                // Increment counter
                jokeCount++;
                document.getElementById('joke-count').textContent = jokeCount;

            } catch (error) {
                jokeText.classList.remove('loading');
                jokeText.textContent = '😞 Oops! Could not load a joke.';
                errorMessage.textContent = `Error: ${error.message}`;
                errorMessage.style.display = 'block';
                console.error('Error:', error);
            } finally {
                btn.disabled = false;
            }
        }

        // Generate a joke on page load
        window.addEventListener('load', generateJoke);
    </script>

</body>
</html>
